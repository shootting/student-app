<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>윷놀이 통계 대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #111; --gray: #666; --bg: #f3f4f6;
      --accent: #4a7aaa; --coin: #c87820; --yut: #4a7aaa;
      --green: #2a7a38;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--black); min-height: 100vh; }

    /* ── HEADER ── */
    header {
      background: #fff; border-bottom: 1px solid #e8e8e8;
      padding: 1rem 2rem; display: flex; align-items: center; gap: 0.8rem;
      position: sticky; top: 0; z-index: 100;
    }
    .hd-text h1 { font-size: 1.1rem; font-weight: 900; }
    .hd-text p  { font-size: 0.72rem; color: var(--gray); margin-top: 1px; }
    .hd-space   { flex: 1; }
    .hd-link    { font-size: 0.8rem; color: var(--accent); text-decoration: none; font-weight: 600; padding: 0.4rem 0.7rem; border: 1.5px solid #d8e4f0; border-radius: 8px; }
    .hd-link:hover { background: #f0f5fb; }
    .btn-hd {
      background: none; border: 1.5px solid #ddd; border-radius: 8px;
      padding: 0.4rem 0.75rem; cursor: pointer; font-size: 0.8rem;
      font-family: inherit; font-weight: 700; transition: border-color .15s, color .15s;
    }
    .btn-hd:hover { border-color: var(--accent); color: var(--accent); }

    /* ── MAIN ── */
    main { max-width: 920px; margin: 0 auto; padding: 2rem 1.5rem; }

    .state-box {
      text-align: center; padding: 5rem 2rem; color: var(--gray);
      font-size: 0.93rem; line-height: 2;
    }

    /* ── PROB CARDS ── */
    .prob-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin-bottom: 1.4rem; }
    .card { background: #fff; border-radius: 20px; padding: 1.8rem 1.6rem; box-shadow: 0 2px 14px rgba(0,0,0,.06); }

    .pc-head { display: flex; align-items: center; gap: 0.55rem; margin-bottom: 1rem; }
    .pc-icon { font-size: 1.5rem; }
    .pc-lbl  { font-size: 0.7rem; font-weight: 800; color: var(--gray); letter-spacing: 0.06em; text-transform: uppercase; }
    .pc-pct  { font-size: 3rem; font-weight: 900; letter-spacing: -0.04em; line-height: 1; margin-bottom: 0.22rem; }
    .pc-pct.coin { color: var(--coin); }
    .pc-pct.yut  { color: var(--yut); }
    .pc-sub  { font-size: 0.75rem; color: var(--gray); margin-bottom: 1.1rem; }

    /* progress bar */
    .bar-wrap { position: relative; margin-bottom: 0.35rem; }
    .bar-track { height: 11px; background: #f0f0f0; border-radius: 11px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 11px; width: 0%; transition: width 0.9s cubic-bezier(.25,.8,.25,1); }
    .bar-fill.coin { background: linear-gradient(90deg, #f0c860, #c87820); }
    .bar-fill.yut  { background: linear-gradient(90deg, #80acd4, #4a7aaa); }
    .bar-marker {
      position: absolute; top: -4px; width: 3px; height: 19px;
      border-radius: 2px; background: rgba(0,0,0,.26);
    }
    .bar-note { font-size: 0.68rem; color: #aaa; margin-top: 0.3rem; }

    .diff-badge { display: inline-block; margin-top: 0.8rem; padding: 0.22rem 0.65rem; border-radius: 20px; font-size: 0.76rem; font-weight: 700; }
    .diff-ok    { background: #d1fae5; color: #065f46; }
    .diff-over  { background: #fee2e2; color: #991b1b; }
    .diff-under { background: #dbeafe; color: #1e40af; }

    /* ── CHART ── */
    .chart-card { background: #fff; border-radius: 20px; padding: 1.8rem 1.6rem; box-shadow: 0 2px 14px rgba(0,0,0,.06); margin-bottom: 1.4rem; }
    .card-ttl  { font-size: 1rem; font-weight: 800; }
    .card-desc { font-size: 0.78rem; color: var(--gray); margin-top: 0.25rem; margin-bottom: 1.3rem; line-height: 1.55; }
    .chart-svg { width: 100%; display: block; }
    .legend    { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 0.85rem; }
    .leg       { display: flex; align-items: center; gap: 0.4rem; font-size: 0.74rem; color: var(--gray); }
    .leg-line  { width: 22px; height: 3px; border-radius: 2px; }
    .leg-dash  { width: 22px; border-top: 2px dashed; }

    /* ── TABLE ── */
    .table-card { background: #fff; border-radius: 20px; padding: 1.8rem 1.6rem; box-shadow: 0 2px 14px rgba(0,0,0,.06); }
    .tbl-head  { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1.1rem; }
    .tbl-badge { font-size: 0.72rem; background: var(--bg); border-radius: 20px; padding: 0.2rem 0.65rem; color: var(--gray); font-weight: 700; }
    .tbl-wrap  { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; white-space: nowrap; }
    th {
      text-align: left; padding: 0.5rem 0.7rem;
      font-size: 0.68rem; font-weight: 800; color: var(--gray); letter-spacing: 0.05em; text-transform: uppercase;
      border-bottom: 2px solid #f0f0f0;
    }
    td { padding: 0.55rem 0.7rem; border-bottom: 1px solid #f5f5f5; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    .bdg { display: inline-block; padding: .15rem .5rem; border-radius: 20px; font-size: .7rem; font-weight: 700; }
    .bdg-c  { background: #fff7ed; color: var(--coin); }
    .bdg-y  { background: #eff6ff; color: var(--yut); }
    .bdg-bd { background: #f5f5f7; color: var(--gray); }
    .bdg-w  { background: #d1fae5; color: #065f46; }

    /* ── MODAL ── */
    .modal-bg  { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.48); z-index: 900; align-items: center; justify-content: center; }
    .modal-bg.on { display: flex; }
    .modal-box { background: #fff; border-radius: 20px; padding: 2rem; max-width: 500px; width: 90%; box-shadow: 0 28px 80px rgba(0,0,0,.22); }
    .modal-box h2 { font-size: 1.05rem; font-weight: 900; margin-bottom: 0.4rem; }
    .modal-box p  { font-size: 0.82rem; color: var(--gray); margin-bottom: 1.2rem; line-height: 1.7; }
    .modal-input  {
      width: 100%; padding: .65rem .85rem; border: 2px solid #e8e8e8; border-radius: 10px;
      font-family: inherit; font-size: .84rem; outline: none; transition: border-color .18s; margin-bottom: 1rem;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: .7rem; justify-content: flex-end; }
    .btn-pri { background: var(--black); color: #fff; border: none; border-radius: 10px; padding: .55rem 1.1rem; font-family: inherit; font-weight: 700; font-size: .84rem; cursor: pointer; }
    .btn-sec { background: none; border: 1.5px solid #ddd; border-radius: 10px; padding: .55rem 1.1rem; font-family: inherit; font-weight: 700; font-size: .84rem; cursor: pointer; }

    @media(max-width: 580px) {
      .prob-grid { grid-template-columns: 1fr; }
      header { padding: .9rem 1rem; }
      main   { padding: 1.2rem 1rem; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="hd-text">
    <h1>📊 윷놀이 통계 대시보드</h1>
    <p>전체 학생 게임 기록 · 통계적 확률 분석</p>
  </div>
  <div class="hd-space"></div>
  <a class="hd-link" href="yut_probability.html">← 게임으로</a>
  <button class="btn-hd" onclick="openSettings()">⚙️ 설정</button>
  <button class="btn-hd" onclick="loadData()">↻ 새로고침</button>
</header>

<main id="app">
  <div class="state-box">📡 데이터를 불러오는 중…</div>
</main>

<!-- ── 설정 모달 ── -->
<div class="modal-bg" id="settingsModal">
  <div class="modal-box">
    <h2>⚙️ Apps Script URL 설정</h2>
    <p>
      Google Apps Script에서 배포한 웹 앱 URL을 입력하세요.<br>
      <strong>tools/apps_script_yut.gs</strong> 코드를 Apps Script 편집기에 붙여넣고 배포하면 URL을 얻을 수 있습니다.<br>
      이 URL은 브라우저에 저장되므로 다음 방문 때도 유지됩니다.
    </p>
    <input class="modal-input" id="urlInput" type="url"
      placeholder="https://script.google.com/macros/s/.../exec">
    <div class="modal-btns">
      <button class="btn-sec" onclick="closeSettings()">취소</button>
      <button class="btn-pri" onclick="saveSettings()">저장하고 불러오기</button>
    </div>
  </div>
</div>

<script>
  /* ── CONFIG ──────────────────────────────────────────────────── */
  // yut_probability.html의 SCRIPT_URL과 동일한 URL입니다.
  // ⚙️ 설정 버튼으로 변경할 수 있으며, 변경 시 브라우저에 저장됩니다.
  const HARDCODED_URL = 'https://script.google.com/macros/s/AKfycbyQ24Cd_v_dFCORrRwnzp9OXeomowRL1D-wkXbKlDTs0QAm583KQiY-BUXx9l4fXpybTg/exec';
  const LS_KEY = 'yut_stats_url';

  function getUrl() {
    return localStorage.getItem(LS_KEY) || HARDCODED_URL;
  }

  /* ── SETTINGS ────────────────────────────────────────────────── */
  function openSettings() {
    const cur = getUrl();
    document.getElementById('urlInput').value = cur === HARDCODED_URL ? '' : cur;
    document.getElementById('settingsModal').classList.add('on');
  }
  function closeSettings() {
    document.getElementById('settingsModal').classList.remove('on');
  }
  function saveSettings() {
    const val = document.getElementById('urlInput').value.trim();
    if (val) localStorage.setItem(LS_KEY, val);
    closeSettings();
    loadData();
  }

  /* ── FETCH DATA ──────────────────────────────────────────────── */
  async function loadData() {
    const url = getUrl();
    if (!url) {
      setContent(`<div class="state-box">
        ⚙️ Apps Script URL이 설정되지 않았습니다.<br>
        오른쪽 위의 <strong>⚙️ 설정</strong> 버튼을 눌러 URL을 입력하세요.
      </div>`);
      return;
    }
    setContent(`<div class="state-box">📡 데이터를 불러오는 중…</div>`);
    try {
      const res  = await fetch(url);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      renderAll(data);
    } catch (err) {
      setContent(`<div class="state-box">
        ⚠️ 데이터를 불러오지 못했습니다.<br>
        <small style="font-size:.8rem">${err.message}</small><br><br>
        <small>URL을 확인하거나 Apps Script 배포 설정(액세스: 모든 사용자)을 점검하세요.</small>
      </div>`);
    }
  }

  function setContent(html) {
    document.getElementById('app').innerHTML = html;
  }

  /* ── RENDER ALL ──────────────────────────────────────────────── */
  function renderAll({ records = [], aggregate = {}, series = {} }) {
    const { totalCoin = 0, frontCoin = 0, totalYut = 0, frontYut = 0 } = aggregate;
    const coinPct = totalCoin > 0 ? frontCoin / totalCoin * 100 : null;
    const yutPct  = totalYut  > 0 ? frontYut  / totalYut  * 100 : null;

    setContent(
      renderProbCards(coinPct, totalCoin, frontCoin, yutPct, totalYut, frontYut) +
      renderChart(series.coin || [], series.yut || []) +
      renderTable(records)
    );

    // 바 너비 애니메이션 (렌더 직후 적용)
    requestAnimationFrame(() => {
      if (coinPct !== null) document.getElementById('barC').style.width = coinPct.toFixed(1) + '%';
      if (yutPct  !== null) document.getElementById('barY').style.width = yutPct.toFixed(1)  + '%';
    });
  }

  /* ── PROB CARDS ──────────────────────────────────────────────── */
  function diffBadge(actual, theory) {
    if (actual === null) return '';
    const d   = actual - theory;
    const abs = Math.abs(d);
    const cls = abs < 3 ? 'diff-ok' : (d > 0 ? 'diff-over' : 'diff-under');
    const sign = d > 0 ? '+' : '';
    return `<div class="diff-badge ${cls}">이론값(${theory}%) 대비 ${sign}${d.toFixed(1)}%</div>`;
  }

  function renderProbCards(coinPct, coinT, coinF, yutPct, yutT, yutF) {
    const fmt  = p  => p  !== null ? p.toFixed(1) + '%' : '—';
    const sub  = (f, t) => t > 0 ? `총 ${t}번 던져 앞면 ${f}번` : '기록 없음';

    return `<div class="prob-grid">
      <div class="card">
        <div class="pc-head"><span class="pc-icon">🪙</span><span class="pc-lbl">동전 앞면 확률</span></div>
        <div class="pc-pct coin">${fmt(coinPct)}</div>
        <div class="pc-sub">${sub(coinF, coinT)}</div>
        <div class="bar-wrap">
          <div class="bar-track"><div class="bar-fill coin" id="barC"></div></div>
          <div class="bar-marker" style="left:50%"></div>
        </div>
        <div class="bar-note">▲ 수직선 = 이론값 50%</div>
        ${diffBadge(coinPct, 50)}
      </div>
      <div class="card">
        <div class="pc-head"><span class="pc-icon">🎯</span><span class="pc-lbl">윷 앞면(평면) 확률</span></div>
        <div class="pc-pct yut">${fmt(yutPct)}</div>
        <div class="pc-sub">${sub(yutF, yutT)}</div>
        <div class="bar-wrap">
          <div class="bar-track"><div class="bar-fill yut" id="barY"></div></div>
          <div class="bar-marker" style="left:40%"></div>
        </div>
        <div class="bar-note">▲ 수직선 = 이론값 40%</div>
        ${diffBadge(yutPct, 40)}
      </div>
    </div>`;
  }

  /* ── CHART (SVG) ─────────────────────────────────────────────── */
  function renderChart(coinSeries, yutSeries) {
    const n = Math.max(coinSeries.length, yutSeries.length);
    const intro = `<div class="chart-card">
      <div class="card-ttl">📈 대수의 법칙 — 누적 확률의 변화</div>
      <div class="card-desc">게임이 쌓일수록 통계적 확률이 이론값(동전 50%, 윷 40%)에 가까워지는지 관찰해 보세요.</div>`;

    if (n === 0) {
      return intro + `<div class="state-box" style="padding:2rem;color:var(--gray)">게임이 기록되면 여기에 그래프가 표시됩니다.</div></div>`;
    }

    const W = 640, H = 230, ml = 46, mr = 22, mt = 18, mb = 38;
    const cW = W - ml - mr, cH = H - mt - mb;
    const xOf = i   => ml + (n <= 1 ? cW / 2 : (i / (n - 1)) * cW);
    const yOf = pct => mt + cH * (1 - pct / 100);

    // 수평 격자선
    const gridLines = [0, 20, 40, 50, 60, 80, 100].map(v => {
      const y = yOf(v).toFixed(1);
      const hi = (v === 40 || v === 50);
      return `
        <line x1="${ml}" y1="${y}" x2="${W-mr}" y2="${y}"
          stroke="${hi ? '#c8d8e8' : '#eee'}" stroke-width="${hi ? 1.5 : 1}"
          ${hi ? 'stroke-dasharray="5,4"' : ''}/>
        <text x="${ml-5}" y="${+y+4}" text-anchor="end" fill="#bbb" font-size="10.5">${v}%</text>`;
    }).join('');

    // 이론값 점선
    const theoryLines = `
      <line x1="${ml}" y1="${yOf(50).toFixed(1)}" x2="${W-mr}" y2="${yOf(50).toFixed(1)}"
        stroke="#c87820" stroke-width="1.8" stroke-dasharray="7,5" opacity="0.5"/>
      <line x1="${ml}" y1="${yOf(40).toFixed(1)}" x2="${W-mr}" y2="${yOf(40).toFixed(1)}"
        stroke="#4a7aaa" stroke-width="1.8" stroke-dasharray="7,5" opacity="0.5"/>
    `;

    function polyLine(series, color) {
      const pts = series
        .map((v, i) => v !== null ? `${xOf(i).toFixed(1)},${yOf(v).toFixed(1)}` : null)
        .filter(Boolean);
      if (!pts.length) return '';
      return `<polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    }

    function endDot(series, color) {
      for (let i = series.length - 1; i >= 0; i--) {
        if (series[i] !== null)
          return `<circle cx="${xOf(i).toFixed(1)}" cy="${yOf(series[i]).toFixed(1)}" r="5" fill="${color}" stroke="#fff" stroke-width="1.5"/>`;
      }
      return '';
    }

    // X축 눈금 (최대 8개)
    const tickN = Math.min(n, 8);
    const ticks = Array.from({ length: tickN }, (_, ti) => {
      const i = Math.round(ti * (n - 1) / Math.max(tickN - 1, 1));
      const x = xOf(i).toFixed(1);
      return `<line x1="${x}" y1="${mt+cH}" x2="${x}" y2="${mt+cH+4}" stroke="#ccc"/>
              <text x="${x}" y="${mt+cH+16}" text-anchor="middle" fill="#bbb" font-size="10.5">${i+1}</text>`;
    }).join('');

    const svg = `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      ${gridLines}
      ${theoryLines}
      ${polyLine(coinSeries, '#c87820')}
      ${polyLine(yutSeries,  '#4a7aaa')}
      ${endDot(coinSeries,   '#c87820')}
      ${endDot(yutSeries,    '#4a7aaa')}
      ${ticks}
      <line x1="${ml}" y1="${mt}" x2="${ml}" y2="${mt+cH+1}" stroke="#ddd"/>
      <text x="${W/2}" y="${H-5}" text-anchor="middle" fill="#bbb" font-size="10.5">게임 순서 (누적)</text>
    </svg>`;

    return intro + svg + `
      <div class="legend">
        <div class="leg"><div class="leg-line" style="background:#c87820"></div>동전 앞면 (실제)</div>
        <div class="leg"><div class="leg-dash" style="border-color:#c87820;opacity:.55"></div>동전 이론값 50%</div>
        <div class="leg"><div class="leg-line" style="background:#4a7aaa"></div>윷 앞면 (실제)</div>
        <div class="leg"><div class="leg-dash" style="border-color:#4a7aaa;opacity:.55"></div>윷 이론값 40%</div>
      </div>
    </div>`;
  }

  /* ── TABLE ───────────────────────────────────────────────────── */
  function renderTable(records) {
    if (!records.length) {
      return `<div class="table-card">
        <div class="tbl-head"><div class="card-ttl">📋 게임 기록</div></div>
        <div class="state-box" style="padding:2rem">기록된 게임이 없습니다.</div>
      </div>`;
    }

    const rows = [...records].reverse().map(r => {
      const coinStr = r.coinTotal > 0
        ? `${r.coinTotal}번 <span class="bdg bdg-c">${(r.coinFront/r.coinTotal*100).toFixed(1)}% 앞면</span>`
        : '<span style="color:#bbb">없음</span>';
      const yutStr  = r.yutTotal  > 0
        ? `${r.yutTotal}번 <span class="bdg bdg-y">${(r.yutFront/r.yutTotal*100).toFixed(1)}% 앞면</span>`
        : '<span style="color:#bbb">없음</span>';
      const board = String(r.boardType).includes('원형') || r.boardType === '1' ? '원형' : '전통';
      return `<tr>
        <td style="color:var(--gray)">${r.timestamp || '—'}</td>
        <td><strong>${r.studentName || '익명'}</strong></td>
        <td><span class="bdg bdg-bd">${board}</span></td>
        <td>${coinStr}</td>
        <td>${yutStr}</td>
        <td>${r.winner ? `<span class="bdg bdg-w">🏆 ${r.winner}</span>` : '—'}</td>
      </tr>`;
    }).join('');

    return `<div class="table-card">
      <div class="tbl-head">
        <div class="card-ttl">📋 게임 기록</div>
        <span class="tbl-badge">총 ${records.length}게임</span>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>일시</th><th>학생</th><th>보드</th>
              <th>🪙 동전</th><th>🎯 윷</th><th>우승</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }

  /* ── INIT ────────────────────────────────────────────────────── */
  loadData();
</script>
</body>
</html>

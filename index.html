<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>재미있는 수학 콘텐츠</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111111;
      --gray:  #666666;
      --light: #f0f0f0;
      --bg:    #fafafa;
      --blue:  #c5d8f0;
      --yellow:#f5eab0;
      --purple:#d8c8f0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 3rem;
      border-bottom: 1px solid #e8e8e8;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--black);
    }

.nav-btn {
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.5rem 1.1rem;
      border: 1.5px solid var(--black);
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      text-decoration: none;
      color: var(--black);
    }

    .nav-btn:hover { background: var(--black); color: #fff; }

    /* ── MAIN 2-COL ── */
    main {
      display: grid;
      grid-template-columns: 2fr 3fr;
      gap: 0;
      flex: 1;
      padding: 4rem 3rem 3rem;
      align-items: center;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── HERO ── */
    .hero {
      padding-right: 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .hero h1 {
      font-size: clamp(2.8rem, 5vw, 4.8rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .hero p {
      font-size: 0.95rem;
      color: var(--gray);
      line-height: 1.75;
    }

    /* Subscribe form */
    .subscribe-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }

    .input-row {
      display: flex;
      align-items: center;
      border-bottom: 1.5px solid #ccc;
      padding-bottom: 0.4rem;
      gap: 0.5rem;
    }

    .input-row input {
      border: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--black);
      outline: none;
      width: 100%;
    }

    .input-row input::placeholder { color: #aaa; }

    .input-row .mail-icon {
      color: #aaa;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .btn-subscribe {
      align-self: flex-start;
      background: var(--black);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.75rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-subscribe:hover { opacity: 0.8; transform: translateY(-1px); }
    .btn-subscribe:active { transform: translateY(0); }

    /* ── CARDS ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
      align-items: stretch;
    }

    .card {
      border-radius: 20px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 16px 32px rgba(0,0,0,0.12);
    }

    .card-top {
      padding: 1.4rem 1.4rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      flex: 1;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tag {
      font-size: 0.7rem;
      font-weight: 600;
      background: var(--light);
      color: var(--gray);
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      letter-spacing: 0.02em;
    }

    .arrow-icon {
      font-size: 1rem;
      color: var(--gray);
      transition: transform 0.2s;
    }

    .card:hover .arrow-icon { transform: translate(2px, -2px); }

    .card-top h2 {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }

    .card-top p {
      font-size: 0.8rem;
      color: var(--gray);
      line-height: 1.6;
    }

    /* Card illustration area */
    .card-illust {
      height: 160px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0 1rem 0;
      position: relative;
      overflow: hidden;
    }

    .card-illust.blue   { background: var(--blue); }
    .card-illust.yellow { background: var(--yellow); }
    .card-illust.purple { background: var(--purple); }

    /* ── SVG ILLUSTRATIONS ── */
    .illust-svg {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--black);
      color: #fff;
      padding: 0.85rem 1.8rem;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0;
      transition: transform 0.35s ease, opacity 0.35s ease;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
        padding: 2.5rem 1.5rem;
      }
      .hero { padding-right: 0; }
      .cards { grid-template-columns: 1fr; }
      nav { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="#" class="nav-logo">∑ 재미있는 수학 콘텐츠</a>
<a href="#" class="nav-btn">📅 일정</a>
  </nav>

  <!-- MAIN -->
  <main>

    <!-- HERO -->
    <section class="hero">
      <h1>고등 수학<br>콘텐츠.</h1>
      <p>수학이 즐거워지는 공간.<br>직접 체험하고 자기주도적으로 학습하며 수학적 사고력을 키워보세요.<br>확률과 통계, 미적분, 기하까지 흥미롭게 체험할 수 있습니다.</p>

      <div class="subscribe-form">
        <div class="input-row">
          <input type="email" id="emailInput" placeholder="이메일 주소" />
          <span class="mail-icon">✉</span>
        </div>
        <button class="btn-subscribe" onclick="handleSubscribe()">학습 알림 받기</button>
      </div>
    </section>

    <!-- CARDS -->
    <section class="cards">

      <!-- Card 1: 확률과 통계 -->
      <a class="card" href="docs/prob_stat.html">
        <div class="card-top">
          <div class="card-header">
            <span class="tag">고등수학</span>
            <span class="arrow-icon">↗</span>
          </div>
          <h2>확률과<br>통계</h2>
          <p>데이터와 확률의 세계. 실생활의 불확실성을 수학적으로 예측해 봅니다.</p>
        </div>
        <div class="card-illust blue">
          <svg class="illust-svg" viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg">
            <!-- Bubble chart style circles -->
            <circle cx="120" cy="100" r="48" fill="#a8c4e8" opacity="0.6"/>
            <circle cx="55" cy="115" r="28" fill="#8ab4d8" opacity="0.55"/>
            <circle cx="195" cy="108" r="32" fill="#a8c4e8" opacity="0.5"/>
            <circle cx="168" cy="68" r="18" fill="#90b8e0" opacity="0.6"/>
            <circle cx="68" cy="72" r="14" fill="#8ab4d8" opacity="0.55"/>
            <circle cx="30" cy="80" r="9" fill="#a0bcd8" opacity="0.5"/>
            <circle cx="215" cy="75" r="10" fill="#90b8e0" opacity="0.5"/>
            <!-- Small dots -->
            <circle cx="140" cy="48" r="5" fill="#7aaece" opacity="0.7"/>
            <circle cx="95" cy="42" r="4" fill="#7aaece" opacity="0.6"/>
            <circle cx="185" cy="45" r="6" fill="#7aaece" opacity="0.5"/>
            <!-- Cute face on main circle -->
            <circle cx="112" cy="96" r="4" fill="#5a8cb8" opacity="0.7"/>
            <circle cx="128" cy="96" r="4" fill="#5a8cb8" opacity="0.7"/>
            <path d="M 110 106 Q 120 114 130 106" stroke="#5a8cb8" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
          </svg>
        </div>
      </a>

      <!-- Card 2: 미적분 -->
      <a class="card" href="docs/calculus.html">
        <div class="card-top">
          <div class="card-header">
            <span class="tag">고등수학</span>
            <span class="arrow-icon">↗</span>
          </div>
          <h2>미적분</h2>
          <p>변화와 흐름의 수학. 함수의 극한부터 미분과 적분까지 깊이 있게 탐구합니다.</p>
        </div>
        <div class="card-illust yellow">
          <svg class="illust-svg" viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg">
            <!-- Wave / integral curve -->
            <path d="M 10 110 C 40 40, 80 150, 120 80 S 180 30, 230 90"
                  stroke="#d4b840" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.8"/>
            <!-- Tangent line -->
            <line x1="85" y1="145" x2="155" y2="45" stroke="#c8a830" stroke-width="1.8" opacity="0.5" stroke-dasharray="5,4"/>
            <!-- Tangent point dot -->
            <circle cx="120" cy="80" r="6" fill="#d4b840" opacity="0.9"/>
            <!-- Area fill under curve suggestion -->
            <path d="M 120 80 C 150 50, 180 30, 230 90 L 230 140 L 120 140 Z"
                  fill="#e8d070" opacity="0.25"/>
            <!-- Sun-like decorative shape -->
            <circle cx="48" cy="48" r="22" fill="#f0d060" opacity="0.55"/>
            <circle cx="48" cy="48" r="14" fill="#e8c840" opacity="0.7"/>
            <!-- Rays -->
            <line x1="48" y1="20" x2="48" y2="12" stroke="#d4b030" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
            <line x1="48" y1="76" x2="48" y2="84" stroke="#d4b030" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
            <line x1="20" y1="48" x2="12" y2="48" stroke="#d4b030" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
            <line x1="76" y1="48" x2="84" y2="48" stroke="#d4b030" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
            <line x1="28" y1="28" x2="22" y2="22" stroke="#d4b030" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
            <line x1="68" y1="68" x2="74" y2="74" stroke="#d4b030" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
            <line x1="68" y1="28" x2="74" y2="22" stroke="#d4b030" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
            <line x1="28" y1="68" x2="22" y2="74" stroke="#d4b030" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
            <!-- Cute face -->
            <circle cx="43" cy="45" r="2.5" fill="#a07820" opacity="0.7"/>
            <circle cx="53" cy="45" r="2.5" fill="#a07820" opacity="0.7"/>
            <path d="M 41 52 Q 48 57 55 52" stroke="#a07820" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
          </svg>
        </div>
      </a>

      <!-- Card 3: 기하 -->
      <a class="card" href="docs/geometry.html">
        <div class="card-top">
          <div class="card-header">
            <span class="tag">고등수학</span>
            <span class="arrow-icon">↗</span>
          </div>
          <h2>기하</h2>
          <p>공간과 도형의 이해. 이차곡선부터 공간좌표까지 직관적으로 학습합니다.</p>
        </div>
        <div class="card-illust purple">
          <svg class="illust-svg" viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg">
            <!-- Ellipse (conic section) -->
            <ellipse cx="120" cy="100" rx="72" ry="42" fill="none" stroke="#b09ad8" stroke-width="3" opacity="0.7"/>
            <ellipse cx="120" cy="100" rx="72" ry="42" fill="#c8b4e8" opacity="0.15"/>
            <!-- Parabola -->
            <path d="M 60 145 Q 120 30 180 145" stroke="#a088c8" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.65"/>
            <!-- Coordinate axes -->
            <line x1="120" y1="10" x2="120" y2="150" stroke="#9878c0" stroke-width="1.5" opacity="0.35" stroke-dasharray="4,3"/>
            <line x1="20" y1="100" x2="220" y2="100" stroke="#9878c0" stroke-width="1.5" opacity="0.35" stroke-dasharray="4,3"/>
            <!-- Focus dots -->
            <circle cx="88" cy="100" r="5" fill="#9878c0" opacity="0.75"/>
            <circle cx="152" cy="100" r="5" fill="#9878c0" opacity="0.75"/>
            <!-- Decorative bunny-like shape top right -->
            <ellipse cx="195" cy="45" rx="16" ry="20" fill="#c8a8e8" opacity="0.6"/>
            <!-- ears -->
            <ellipse cx="188" cy="24" rx="5" ry="10" fill="#c8a8e8" opacity="0.55"/>
            <ellipse cx="202" cy="24" rx="5" ry="10" fill="#c8a8e8" opacity="0.55"/>
            <ellipse cx="188" cy="24" rx="2.5" ry="6" fill="#e8c8e8" opacity="0.6"/>
            <ellipse cx="202" cy="24" rx="2.5" ry="6" fill="#e8c8e8" opacity="0.6"/>
            <!-- Eyes -->
            <circle cx="191" cy="42" r="2.5" fill="#7050a8" opacity="0.75"/>
            <circle cx="199" cy="42" r="2.5" fill="#7050a8" opacity="0.75"/>
            <!-- Nose/smile -->
            <circle cx="195" cy="47" r="1.5" fill="#c080b0" opacity="0.7"/>
            <path d="M 191 51 Q 195 55 199 51" stroke="#7050a8" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.65"/>
          </svg>
        </div>
      </a>

    </section>
  </main>

  <!-- TOAST -->
  <div id="toast"></div>

  <script>
    // Google Sheets 연동 (추후 Apps Script URL로 교체)
    function saveToGoogleSheets(email) {
      // TODO: fetch('YOUR_APPS_SCRIPT_URL', { method:'POST', body: JSON.stringify({email}) })
      console.log('Saving email to Google Sheets:', email);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function handleSubscribe() {
      const input = document.getElementById('emailInput');
      const email = input.value.trim();
      if (!email || !email.includes('@')) {
        showToast('올바른 이메일 주소를 입력해 주세요.');
        return;
      }
      saveToGoogleSheets(email);
      input.value = '';
      showToast('학습 알림 신청 완료! 곧 연락드릴게요 🎉');
    }

    // Enter key support
    document.getElementById('emailInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleSubscribe();
    });

  </script>
</body>
</html>
